name: Trigger Bot

on:
  schedule:
    - cron: '0 */5 * * *'   # every 5 hours
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Make discord-telegram-bot public
        run: |
          curl -s -o /dev/null -X PATCH \
            -H "Authorization: Bearer ${{ secrets.PAT_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/rai4it/discord-telegram-bot \
            -d '{"private": false}'

      - name: Cancel any running bot jobs
        run: |
          RUNS=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.PAT_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/rai4it/discord-telegram-bot/actions/workflows/bot.yml/runs?status=in_progress&per_page=5")
          echo "$RUNS" | python3 -c "
          import json,sys
          runs = json.load(sys.stdin).get('workflow_runs', [])
          for r in runs: print(r['id'])
          " | while read id; do
            curl -s -o /dev/null -X POST \
              -H "Authorization: Bearer ${{ secrets.PAT_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/rai4it/discord-telegram-bot/actions/runs/$id/cancel"
          done
          sleep 10

      - name: Trigger bot workflow
        run: |
          curl -s -o /dev/null -X POST \
            -H "Authorization: Bearer ${{ secrets.PAT_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/rai4it/discord-telegram-bot/actions/workflows/bot.yml/dispatches \
            -d '{"ref": "main"}'

      - name: Wait for bot to start
        run: |
          for i in $(seq 1 24); do
            sleep 10
            STATUS=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.PAT_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/rai4it/discord-telegram-bot/actions/workflows/bot.yml/runs?per_page=1" \
              | python3 -c "import json,sys; runs=json.load(sys.stdin).get('workflow_runs',[]); print(runs[0]['status'] if runs else 'none')")
            if [ "$STATUS" = "in_progress" ]; then
              echo "Bot is running!"
              break
            fi
            echo "Waiting... ($i/24) status=$STATUS"
          done

      - name: Make discord-telegram-bot private again
        if: always()
        run: |
          curl -s -o /dev/null -X PATCH \
            -H "Authorization: Bearer ${{ secrets.PAT_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/rai4it/discord-telegram-bot \
            -d '{"private": true}'
